<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANT AI - Institutional Terminal</title>
    <style>
        :root {
            --bg-color: #0b0e11; --card-bg: #181a20; --text-main: #eaecef;
            --text-muted: #848e9c; --accent: #f0b90b; --green: #00ff88; --red: #ff3333;
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        /* Navigation & Menu Bar */
        .navbar { background: var(--bg-color); border-bottom: 1px solid #2b3139; padding: 10px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 22px; font-weight: 800; letter-spacing: 1px; }
        .logo span { color: var(--accent); }
        .menu-bar { display: flex; gap: 20px; }
        .menu-item { color: var(--text-muted); cursor: pointer; font-size: 14px; font-weight: 600; transition: 0.3s; padding: 8px 12px; border-radius: 4px; }
        .menu-item:hover, .menu-item.active { color: var(--accent); background: rgba(240, 185, 11, 0.1); }

        .container { padding: 30px 40px; max-width: 1400px; margin: 0 auto; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        /* Market Table */
        .table-container { background: var(--card-bg); border-radius: 12px; border: 1px solid #2b3139; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: var(--text-muted); font-size: 12px; text-transform: uppercase; border-bottom: 1px solid #2b3139; }
        td { padding: 20px 15px; border-bottom: 1px solid #2b3139; font-size: 15px; font-weight: 500; }
        tr:hover { background: #1e2329; }

        /* Badges & Trading Info */
        .symbol-box { display: flex; flex-direction: column; }
        .sub-text { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
        .price-box { font
